<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Image Extractor</title>
  <style>
    :root {
      --bg: #0d0a14;
      --panel: #15101f;
      --border: #2a1f3d;
      --primary: #8b5cf6;
      --primary-hover: #a78bfa;
      --text: #f4f1fa;
      --muted: #a89cc4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #a78bfa, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.sub { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    .row { display: flex; gap: 8px; margin-bottom: 10px; }
    button {
      flex: 1;
      background: var(--primary);
      color: white;
      border: none;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: var(--primary-hover); }
    button.secondary {
      background: var(--panel);
      border: 1px solid var(--border);
    }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .stats {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 10px;
      color: var(--muted);
    }
    .stats strong { color: var(--text); }
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      font-size: 11px;
      color: var(--muted);
      align-items: center;
    }
    .filters input {
      width: 60px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 11px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      max-height: 320px;
      overflow-y: auto;
      padding: 4px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .grid::-webkit-scrollbar { width: 6px; }
    .grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .thumb {
      position: relative;
      aspect-ratio: 1;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      background: #000;
      border: 2px solid transparent;
    }
    .thumb.selected { border-color: var(--primary); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb .check {
      position: absolute; top: 2px; right: 2px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--primary); color: white;
      font-size: 11px; line-height: 16px; text-align: center;
      display: none;
    }
    .thumb.selected .check { display: block; }
    .empty { padding: 24px; text-align: center; color: var(--muted); font-size: 12px; grid-column: 1/-1; }
    .footer { margin-top: 10px; font-size: 11px; color: var(--muted); text-align: center; }
  </style>
</head>
<body>
  <h1>Gallery Extractor</h1>
  <p class="sub">Extrae imágenes de la página actual</p>

  <div class="row">
    <button id="scan">Escanear página</button>
    <button id="scrollScan" class="secondary" title="Hace scroll automático para cargar imágenes lazy">Scroll + Escanear</button>
  </div>

  <div class="filters">
    <span>Min:</span>
    <input type="number" id="minW" value="100" min="0" /> ancho px
    <input type="number" id="minH" value="100" min="0" /> alto px
  </div>

  <div class="stats" id="stats">Sin imágenes escaneadas todavía.</div>

  <div class="row">
    <button id="selectAll" class="secondary">Seleccionar todas</button>
    <button id="download">Descargar seleccionadas</button>
  </div>

  <div class="grid" id="grid">
    <div class="empty">Haz clic en "Escanear página" para empezar.</div>
  </div>

  <div class="footer">Image Converter Right</div>

  <script src="popup.js"></script>
</body>
</html>
